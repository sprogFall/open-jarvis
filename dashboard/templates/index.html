<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OpenJarvis Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config={theme:{extend:{fontFamily:{sans:['Fira Sans','system-ui','sans-serif'],mono:['Fira Code','monospace']},colors:{surface:'#0F172A',panel:'#1E293B',border:'#334155',accent:'#22C55E','accent-hover':'#16A34A',danger:'#EF4444','danger-hover':'#DC2626',warn:'#F59E0B',info:'#3B82F6'}}}}
</script>
<style>
body{background:#020617;color:#F8FAFC}
.tab-btn.active{color:#22C55E;border-color:#22C55E}
.stat-card{transition:all .2s}
.stat-card:hover{transform:translateY(-2px);box-shadow:0 0 20px rgba(34,197,94,.1)}
.pulse{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
dialog::backdrop{background:rgba(0,0,0,.6)}
dialog{background:#1E293B;color:#F8FAFC;border:1px solid #334155;border-radius:.75rem}
table{border-collapse:collapse;width:100%}
th{text-align:left;font-weight:500;color:#94A3B8;font-size:.75rem;text-transform:uppercase;letter-spacing:.05em}
td,th{padding:.75rem 1rem;border-bottom:1px solid #1E293B}
tr:hover td{background:#0F172A}
.badge{display:inline-flex;align-items:center;padding:.125rem .5rem;border-radius:9999px;font-size:.75rem;font-weight:500}
.badge-green{background:rgba(34,197,94,.15);color:#22C55E}
.badge-red{background:rgba(239,68,68,.15);color:#EF4444}
.badge-yellow{background:rgba(245,158,11,.15);color:#F59E0B}
.badge-blue{background:rgba(59,130,246,.15);color:#3B82F6}
.badge-gray{background:rgba(148,163,184,.15);color:#94A3B8}
input,select,textarea{background:#0F172A;border:1px solid #334155;color:#F8FAFC;border-radius:.5rem;padding:.5rem .75rem;font-size:.875rem;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:#22C55E;box-shadow:0 0 0 2px rgba(34,197,94,.2)}
button{cursor:pointer;transition:all .15s}
.btn-primary{background:#22C55E;color:#020617;padding:.5rem 1rem;border-radius:.5rem;font-weight:600;border:none}
.btn-primary:hover{background:#16A34A}
.btn-danger{background:transparent;color:#EF4444;padding:.5rem 1rem;border-radius:.5rem;font-weight:500;border:1px solid #EF4444}
.btn-danger:hover{background:#EF4444;color:#fff}
.btn-ghost{background:transparent;color:#94A3B8;padding:.5rem .75rem;border-radius:.5rem;border:1px solid #334155}
.btn-ghost:hover{color:#F8FAFC;border-color:#94A3B8}
.empty-state{text-align:center;padding:3rem 1rem;color:#64748B}
</style>
</head>
<body class="font-sans min-h-screen">

<!-- login overlay -->
<div id="login-overlay" class="fixed inset-0 z-[100] bg-[#020617] flex items-center justify-center">
  <div class="w-full max-w-sm mx-4">
    <div class="text-center mb-8">
      <svg class="w-12 h-12 text-accent mx-auto mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
      <h1 class="text-2xl font-bold">OpenJarvis Dashboard</h1>
      <p class="text-sm text-slate-400 mt-1">请登录以继续</p>
    </div>
    <form id="login-form" class="bg-panel rounded-xl border border-border p-6 space-y-4">
      <div>
        <label class="text-xs text-slate-400 block mb-1">用户名</label>
        <input id="login-user" name="username" required autocomplete="username" placeholder="operator">
      </div>
      <div>
        <label class="text-xs text-slate-400 block mb-1">密码</label>
        <input id="login-pass" name="password" type="password" required autocomplete="current-password" placeholder="******">
      </div>
      <p id="login-error" class="text-sm text-danger hidden"></p>
      <button type="submit" class="btn-primary w-full text-sm">登录</button>
    </form>
  </div>
</div>

<!-- app (hidden until logged in) -->
<div id="app-root" class="hidden">

<!-- header -->
<header class="sticky top-0 z-50 bg-surface/80 backdrop-blur border-b border-border">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 h-14 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <svg class="w-7 h-7 text-accent" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
      <h1 class="text-lg font-semibold tracking-tight">OpenJarvis <span class="text-accent">Dashboard</span></h1>
    </div>
    <div class="flex items-center gap-3">
      <span id="live-dot" class="w-2 h-2 rounded-full bg-accent pulse"></span>
      <span class="text-xs text-slate-400">实时</span>
      <span class="text-xs text-slate-500">|</span>
      <span id="user-label" class="text-xs text-slate-400"></span>
      <button class="btn-ghost text-xs py-1 px-2" onclick="logout()">退出</button>
    </div>
  </div>
</header>

<!-- tabs -->
<nav class="border-b border-border bg-surface/50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 flex gap-1 overflow-x-auto">
    <button class="tab-btn active px-4 py-3 text-sm font-medium border-b-2 border-transparent whitespace-nowrap" data-tab="overview">概览</button>
    <button class="tab-btn px-4 py-3 text-sm font-medium border-b-2 border-transparent text-slate-400 whitespace-nowrap" data-tab="devices">设备管理</button>
    <button class="tab-btn px-4 py-3 text-sm font-medium border-b-2 border-transparent text-slate-400 whitespace-nowrap" data-tab="skills">Skill 管理</button>
    <button class="tab-btn px-4 py-3 text-sm font-medium border-b-2 border-transparent text-slate-400 whitespace-nowrap" data-tab="tasks">任务监控</button>
    <button class="tab-btn px-4 py-3 text-sm font-medium border-b-2 border-transparent text-slate-400 whitespace-nowrap" data-tab="settings">系统设置</button>
  </div>
</nav>

<!-- content -->
<main class="max-w-7xl mx-auto px-4 sm:px-6 py-6">
  <!-- overview -->
  <section id="tab-overview">
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
      <div class="stat-card bg-panel rounded-xl p-5 border border-border">
        <p class="text-xs text-slate-400 uppercase tracking-wide mb-1">注册设备</p>
        <p id="stat-devices" class="text-3xl font-bold font-mono">-</p>
      </div>
      <div class="stat-card bg-panel rounded-xl p-5 border border-border">
        <p class="text-xs text-slate-400 uppercase tracking-wide mb-1">在线设备</p>
        <p id="stat-online" class="text-3xl font-bold font-mono text-accent">-</p>
      </div>
      <div class="stat-card bg-panel rounded-xl p-5 border border-border">
        <p class="text-xs text-slate-400 uppercase tracking-wide mb-1">App 连接</p>
        <p id="stat-apps" class="text-3xl font-bold font-mono text-info">-</p>
      </div>
      <div class="stat-card bg-panel rounded-xl p-5 border border-border">
        <p class="text-xs text-slate-400 uppercase tracking-wide mb-1">Skill 数量</p>
        <p id="stat-skills" class="text-3xl font-bold font-mono text-warn">-</p>
      </div>
    </div>
    <div class="grid lg:grid-cols-2 gap-4">
      <div class="bg-panel rounded-xl border border-border p-5">
        <h3 class="text-sm font-semibold text-slate-300 mb-4">任务状态分布</h3>
        <div id="task-status-chart" class="space-y-2"></div>
      </div>
      <div class="bg-panel rounded-xl border border-border p-5">
        <h3 class="text-sm font-semibold text-slate-300 mb-4">在线设备列表</h3>
        <div id="online-devices-list"></div>
      </div>
    </div>
  </section>
  <!-- devices -->
  <section id="tab-devices" class="hidden">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-lg font-semibold">设备管理</h2>
      <button class="btn-primary text-sm" onclick="showDialog('device-dialog')">+ 添加设备</button>
    </div>
    <div class="bg-panel rounded-xl border border-border overflow-hidden">
      <table><thead><tr class="bg-surface"><th>设备ID</th><th>名称</th><th>类型</th><th>状态</th><th>Skills</th><th>最后活跃</th><th>操作</th></tr></thead>
        <tbody id="devices-tbody"></tbody></table>
    </div>
  </section>
  <!-- skills -->
  <section id="tab-skills" class="hidden">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-lg font-semibold">Skill 管理</h2>
      <button class="btn-primary text-sm" onclick="showDialog('skill-dialog')">+ 添加 Skill</button>
    </div>
    <div class="bg-panel rounded-xl border border-border overflow-hidden">
      <table><thead><tr class="bg-surface"><th>Skill ID</th><th>名称</th><th>描述</th><th>创建时间</th><th>操作</th></tr></thead>
        <tbody id="skills-tbody"></tbody></table>
    </div>
  </section>
  <!-- tasks -->
  <section id="tab-tasks" class="hidden">
    <div class="flex items-center justify-between mb-4 flex-wrap gap-2">
      <h2 class="text-lg font-semibold">任务监控</h2>
      <div class="flex gap-2">
        <select id="task-filter-status" class="text-sm w-40" onchange="loadTasks()">
          <option value="">全部状态</option><option value="PENDING_DISPATCH">待分发</option><option value="RUNNING">运行中</option>
          <option value="AWAITING_APPROVAL">待审批</option><option value="APPROVED">已批准</option><option value="REJECTED">已拒绝</option>
          <option value="COMPLETED">已完成</option><option value="FAILED">失败</option>
        </select>
        <select id="task-filter-device" class="text-sm w-40" onchange="loadTasks()"><option value="">全部设备</option></select>
      </div>
    </div>
    <div class="bg-panel rounded-xl border border-border overflow-hidden">
      <table><thead><tr class="bg-surface"><th>任务ID</th><th>设备</th><th>指令</th><th>状态</th><th>日志</th></tr></thead>
        <tbody id="tasks-tbody"></tbody></table>
    </div>
  </section>
  <!-- settings -->
  <section id="tab-settings" class="hidden">
    <h2 class="text-lg font-semibold mb-4">系统设置</h2>
    <div class="bg-panel rounded-xl border border-border p-5 space-y-4"><div id="system-info"></div></div>
  </section>
</main>
</div><!-- /app-root -->

<!-- dialogs -->
<dialog id="device-dialog" class="w-full max-w-md p-6">
  <h3 class="text-lg font-semibold mb-4">添加设备</h3>
  <form id="device-form" class="space-y-3" onsubmit="return submitDevice(event)">
    <div><label class="text-xs text-slate-400">设备 ID</label><input name="device_id" required placeholder="my-device"></div>
    <div><label class="text-xs text-slate-400">名称</label><input name="name" required placeholder="我的设备"></div>
    <div><label class="text-xs text-slate-400">类型</label><select name="type"><option value="cli">CLI</option><option value="app">App</option></select></div>
    <div><label class="text-xs text-slate-400">密钥（留空自动生成）</label><input name="device_key" placeholder="自动生成"></div>
    <div class="flex justify-end gap-2 pt-2"><button type="button" class="btn-ghost text-sm" onclick="closeDialog('device-dialog')">取消</button><button type="submit" class="btn-primary text-sm">创建</button></div>
  </form>
</dialog>
<dialog id="skill-dialog" class="w-full max-w-md p-6">
  <h3 class="text-lg font-semibold mb-4">添加 Skill</h3>
  <form id="skill-form" class="space-y-3" onsubmit="return submitSkill(event)">
    <div><label class="text-xs text-slate-400">Skill ID</label><input name="skill_id" required placeholder="web-search"></div>
    <div><label class="text-xs text-slate-400">名称</label><input name="name" required placeholder="网页搜索"></div>
    <div><label class="text-xs text-slate-400">描述</label><textarea name="description" rows="2" placeholder="Skill 功能描述…"></textarea></div>
    <div><label class="text-xs text-slate-400">配置 (JSON)</label><textarea name="config" rows="3" placeholder="{}"></textarea></div>
    <div class="flex justify-end gap-2 pt-2"><button type="button" class="btn-ghost text-sm" onclick="closeDialog('skill-dialog')">取消</button><button type="submit" class="btn-primary text-sm">创建</button></div>
  </form>
</dialog>
<dialog id="assign-dialog" class="w-full max-w-md p-6">
  <h3 class="text-lg font-semibold mb-4">分配 Skill</h3>
  <form id="assign-form" class="space-y-3" onsubmit="return submitAssign(event)">
    <input type="hidden" name="device_id">
    <div><label class="text-xs text-slate-400">选择 Skill</label><select name="skill_id" id="assign-skill-select"></select></div>
    <div><label class="text-xs text-slate-400">配置 (JSON)</label><textarea name="config" rows="3" placeholder="{}"></textarea></div>
    <div class="flex justify-end gap-2 pt-2"><button type="button" class="btn-ghost text-sm" onclick="closeDialog('assign-dialog')">取消</button><button type="submit" class="btn-primary text-sm">分配</button></div>
  </form>
</dialog>
<dialog id="task-dialog" class="w-full max-w-2xl p-6">
  <div class="flex justify-between items-start mb-4"><h3 class="text-lg font-semibold">任务详情</h3><button class="btn-ghost text-sm" onclick="closeDialog('task-dialog')">关闭</button></div>
  <div id="task-detail-content" class="space-y-3 text-sm"></div>
</dialog>

<script>
const API = '/dashboard/api';
let _token = localStorage.getItem('dashboard_token');

// ── auth ────────────────────────────────────────────────────────────────────
function showApp() {
  document.getElementById('login-overlay').classList.add('hidden');
  document.getElementById('app-root').classList.remove('hidden');
  try {
    const payload = JSON.parse(atob(_token.split('.')[1]));
    document.getElementById('user-label').textContent = payload.sub || '';
  } catch {}
  loadOverview();
}

function logout() {
  _token = null;
  localStorage.removeItem('dashboard_token');
  document.getElementById('app-root').classList.add('hidden');
  document.getElementById('login-overlay').classList.remove('hidden');
  document.getElementById('login-error').classList.add('hidden');
}

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errEl = document.getElementById('login-error');
  errEl.classList.add('hidden');
  const username = document.getElementById('login-user').value;
  const password = document.getElementById('login-pass').value;
  try {
    const res = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    if (!res.ok) { const d = await res.json().catch(()=>({})); throw new Error(d.detail || '登录失败'); }
    const data = await res.json();
    _token = data.access_token;
    localStorage.setItem('dashboard_token', _token);
    showApp();
  } catch (err) {
    errEl.textContent = err.message;
    errEl.classList.remove('hidden');
  }
});

// check existing token on load
if (_token) {
  try {
    const payload = JSON.parse(atob(_token.split('.')[1]));
    if (payload.exp * 1000 > Date.now()) { showApp(); } else { logout(); }
  } catch { logout(); }
}

// ── tab switching ────────────────────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => { b.classList.remove('active'); b.classList.add('text-slate-400'); });
    btn.classList.add('active'); btn.classList.remove('text-slate-400');
    document.querySelectorAll('main > section').forEach(s => s.classList.add('hidden'));
    document.getElementById('tab-' + btn.dataset.tab).classList.remove('hidden');
    refreshTab(btn.dataset.tab);
  });
});

function refreshTab(tab) {
  if (tab === 'overview') loadOverview();
  else if (tab === 'devices') loadDevices();
  else if (tab === 'skills') loadSkills();
  else if (tab === 'tasks') loadTasks();
  else if (tab === 'settings') loadSystem();
}

// ── api helper ───────────────────────────────────────────────────────────────
async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...opts.headers };
  if (_token) headers['Authorization'] = 'Bearer ' + _token;
  const res = await fetch(API + path, { ...opts, headers });
  if (res.status === 401) { logout(); throw new Error('登录已过期'); }
  if (res.status === 204) return null;
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.detail || res.statusText);
  }
  return res.json();
}

// ── dialog helpers ───────────────────────────────────────────────────────────
function showDialog(id) { document.getElementById(id).showModal(); }
function closeDialog(id) { document.getElementById(id).close(); }

// ── badges ───────────────────────────────────────────────────────────────────
const STATUS_COLORS = { PENDING_DISPATCH:'badge-gray',RUNNING:'badge-blue',AWAITING_APPROVAL:'badge-yellow',APPROVED:'badge-green',REJECTED:'badge-red',COMPLETED:'badge-green',FAILED:'badge-red' };
const STATUS_LABELS = { PENDING_DISPATCH:'待分发',RUNNING:'运行中',AWAITING_APPROVAL:'待审批',APPROVED:'已批准',REJECTED:'已拒绝',COMPLETED:'已完成',FAILED:'失败' };
function statusBadge(s){return `<span class="badge ${STATUS_COLORS[s]||'badge-gray'}">${STATUS_LABELS[s]||s}</span>`;}
function typeBadge(t){return `<span class="badge ${t==='cli'?'badge-blue':'badge-green'}">${t.toUpperCase()}</span>`;}
function connBadge(c){return c?'<span class="badge badge-green">在线</span>':'<span class="badge badge-gray">离线</span>';}

// ── overview ─────────────────────────────────────────────────────────────────
async function loadOverview(){try{
  const d=await api('/overview');
  document.getElementById('stat-devices').textContent=d.device_count;
  document.getElementById('stat-online').textContent=d.connected_devices.length;
  document.getElementById('stat-apps').textContent=d.app_connections;
  document.getElementById('stat-skills').textContent=d.skill_count;
  const chart=document.getElementById('task-status-chart');const counts=d.task_counts||{};
  const total=Object.values(counts).reduce((a,b)=>a+b,0)||1;
  chart.innerHTML=Object.keys(counts).length===0?'<p class="text-sm text-slate-500">暂无任务数据</p>':
    Object.entries(counts).map(([s,c])=>`<div class="flex items-center gap-3">${statusBadge(s)}<div class="flex-1 h-2 bg-surface rounded-full overflow-hidden"><div class="h-full rounded-full ${s==='COMPLETED'?'bg-accent':s==='FAILED'?'bg-danger':s==='RUNNING'?'bg-info':'bg-warn'}" style="width:${(c/total*100).toFixed(1)}%"></div></div><span class="text-sm font-mono text-slate-400 w-8 text-right">${c}</span></div>`).join('');
  const list=document.getElementById('online-devices-list');
  list.innerHTML=d.connected_devices.length===0?'<p class="text-sm text-slate-500">暂无在线设备</p>':
    d.connected_devices.map(id=>`<div class="flex items-center gap-2 py-2 border-b border-border last:border-0"><span class="w-2 h-2 rounded-full bg-accent"></span><span class="font-mono text-sm">${esc(id)}</span></div>`).join('');
}catch(e){console.error('overview',e);}}

// ── devices ──────────────────────────────────────────────────────────────────
async function loadDevices(){try{
  const devices=await api('/devices');const tbody=document.getElementById('devices-tbody');
  if(!devices.length){tbody.innerHTML='<tr><td colspan="7" class="empty-state">暂无设备，点击右上角添加</td></tr>';return;}
  tbody.innerHTML=devices.map(d=>`<tr><td class="font-mono text-sm">${esc(d.device_id)}</td><td>${esc(d.name)}</td><td>${typeBadge(d.type)}</td><td>${connBadge(d.connected)}</td><td><button class="btn-ghost text-xs" onclick="viewDeviceSkills('${esc(d.device_id)}')">查看 / 分配</button></td><td class="text-xs text-slate-500">${d.last_seen_at?new Date(d.last_seen_at).toLocaleString('zh-CN'):'-'}</td><td><button class="text-xs text-danger hover:underline" onclick="deleteDevice('${esc(d.device_id)}')">删除</button></td></tr>`).join('');
  const sel=document.getElementById('task-filter-device');const v=sel.value;
  sel.innerHTML='<option value="">全部设备</option>'+devices.map(d=>`<option value="${esc(d.device_id)}">${esc(d.device_id)}</option>`).join('');sel.value=v;
}catch(e){console.error('devices',e);}}

async function submitDevice(ev){ev.preventDefault();const fd=new FormData(ev.target);try{await api('/devices',{method:'POST',body:JSON.stringify(Object.fromEntries(fd))});closeDialog('device-dialog');ev.target.reset();loadDevices();loadOverview();}catch(e){alert(e.message);}return false;}
async function deleteDevice(id){if(!confirm(`确认删除设备 ${id}？`))return;try{await api('/devices/'+id,{method:'DELETE'});loadDevices();loadOverview();}catch(e){alert(e.message);}}

async function viewDeviceSkills(deviceId){try{
  const[skills,allSkills]=await Promise.all([api('/devices/'+deviceId+'/skills'),api('/skills')]);
  document.getElementById('assign-skill-select').innerHTML=allSkills.map(s=>`<option value="${esc(s.skill_id)}">${esc(s.name)}</option>`).join('');
  document.querySelector('#assign-form input[name="device_id"]').value=deviceId;
  const c=document.getElementById('task-detail-content');
  c.innerHTML=`<h4 class="font-semibold">设备 <span class="font-mono text-accent">${esc(deviceId)}</span> 的 Skills</h4>
    ${skills.length===0?'<p class="text-slate-500">暂无分配的 Skill</p>':`<table><thead><tr><th>Skill</th><th>描述</th><th>分配时间</th><th>操作</th></tr></thead><tbody>${skills.map(s=>`<tr><td class="font-mono text-sm">${esc(s.name)}</td><td class="text-sm text-slate-400">${esc(s.description||'')}</td><td class="text-xs text-slate-500">${new Date(s.assigned_at).toLocaleString('zh-CN')}</td><td><button class="text-xs text-danger hover:underline" onclick="unassignSkill('${esc(deviceId)}','${esc(s.skill_id)}')">移除</button></td></tr>`).join('')}</tbody></table>`}
    <button class="btn-primary text-sm mt-3" onclick="closeDialog('task-dialog');showDialog('assign-dialog')">+ 分配新 Skill</button>`;
  showDialog('task-dialog');
}catch(e){alert(e.message);}}

async function unassignSkill(did,sid){try{await api(`/devices/${did}/skills/${sid}`,{method:'DELETE'});viewDeviceSkills(did);}catch(e){alert(e.message);}}
async function submitAssign(ev){ev.preventDefault();const fd=new FormData(ev.target);const did=fd.get('device_id');let cfg={};try{cfg=JSON.parse(fd.get('config')||'{}');}catch{alert('配置 JSON 格式错误');return false;}try{await api('/devices/'+did+'/skills',{method:'POST',body:JSON.stringify({skill_id:fd.get('skill_id'),config:cfg})});closeDialog('assign-dialog');ev.target.reset();viewDeviceSkills(did);}catch(e){alert(e.message);}return false;}

// ── skills ───────────────────────────────────────────────────────────────────
async function loadSkills(){try{
  const skills=await api('/skills');const tbody=document.getElementById('skills-tbody');
  if(!skills.length){tbody.innerHTML='<tr><td colspan="5" class="empty-state">暂无 Skill，点击右上角添加</td></tr>';return;}
  tbody.innerHTML=skills.map(s=>`<tr><td class="font-mono text-sm">${esc(s.skill_id)}</td><td>${esc(s.name)}</td><td class="text-sm text-slate-400 max-w-xs truncate">${esc(s.description||'-')}</td><td class="text-xs text-slate-500">${new Date(s.created_at).toLocaleString('zh-CN')}</td><td><button class="text-xs text-danger hover:underline" onclick="deleteSkill('${esc(s.skill_id)}')">删除</button></td></tr>`).join('');
}catch(e){console.error('skills',e);}}

async function submitSkill(ev){ev.preventDefault();const fd=new FormData(ev.target);let cfg={};try{cfg=JSON.parse(fd.get('config')||'{}');}catch{alert('配置 JSON 格式错误');return false;}try{await api('/skills',{method:'POST',body:JSON.stringify({skill_id:fd.get('skill_id'),name:fd.get('name'),description:fd.get('description'),config:cfg})});closeDialog('skill-dialog');ev.target.reset();loadSkills();loadOverview();}catch(e){alert(e.message);}return false;}
async function deleteSkill(id){if(!confirm(`确认删除 Skill ${id}？`))return;try{await api('/skills/'+id,{method:'DELETE'});loadSkills();loadOverview();}catch(e){alert(e.message);}}

// ── tasks ────────────────────────────────────────────────────────────────────
async function loadTasks(){try{
  const st=document.getElementById('task-filter-status').value;const dv=document.getElementById('task-filter-device').value;
  let q='/tasks?limit=50';if(st)q+='&status='+st;if(dv)q+='&device_id='+dv;
  const tasks=await api(q);const tbody=document.getElementById('tasks-tbody');
  if(!tasks.length){tbody.innerHTML='<tr><td colspan="5" class="empty-state">暂无任务</td></tr>';return;}
  tbody.innerHTML=tasks.map(t=>`<tr><td class="font-mono text-xs">${esc(t.task_id)}</td><td class="font-mono text-sm">${esc(t.device_id)}</td><td class="text-sm max-w-xs truncate">${esc(t.instruction)}</td><td>${statusBadge(t.status)}</td><td><button class="btn-ghost text-xs" onclick='showTaskDetail(${JSON.stringify(t).replace(/\x27/g,"&#39;")})'>${(t.logs||[]).length} 条</button></td></tr>`).join('');
}catch(e){console.error('tasks',e);}}

function showTaskDetail(t){
  const c=document.getElementById('task-detail-content');
  c.innerHTML=`<div class="grid grid-cols-2 gap-3"><div><span class="text-xs text-slate-400">任务ID</span><p class="font-mono text-sm">${esc(t.task_id)}</p></div><div><span class="text-xs text-slate-400">设备</span><p class="font-mono text-sm">${esc(t.device_id)}</p></div><div><span class="text-xs text-slate-400">状态</span><p>${statusBadge(t.status)}</p></div><div><span class="text-xs text-slate-400">检查点</span><p class="font-mono text-xs">${esc(t.checkpoint_id||'-')}</p></div></div>
    <div><span class="text-xs text-slate-400">指令</span><p class="text-sm bg-surface rounded p-2 mt-1">${esc(t.instruction)}</p></div>
    ${t.command?`<div><span class="text-xs text-slate-400">命令</span><p class="font-mono text-xs bg-surface rounded p-2 mt-1">${esc(t.command)}</p></div>`:''}
    ${t.result?`<div><span class="text-xs text-slate-400">结果</span><pre class="text-xs bg-surface rounded p-2 mt-1 overflow-auto max-h-40">${esc(typeof t.result==='string'?t.result:JSON.stringify(t.result,null,2))}</pre></div>`:''}
    ${t.error?`<div><span class="text-xs text-slate-400">错误</span><p class="text-sm text-danger">${esc(t.error)}</p></div>`:''}
    <div><span class="text-xs text-slate-400">日志 (${(t.logs||[]).length} 条)</span><div class="bg-surface rounded p-2 mt-1 max-h-60 overflow-auto font-mono text-xs space-y-1">${(t.logs||[]).length===0?'<p class="text-slate-600">无日志</p>':(t.logs||[]).map(l=>`<p class="border-b border-border pb-1">${esc(l)}</p>`).join('')}</div></div>`;
  showDialog('task-dialog');
}

// ── settings ─────────────────────────────────────────────────────────────────
async function loadSystem(){try{
  const info=await api('/system');
  document.getElementById('system-info').innerHTML=`<div class="space-y-4">
    <div class="flex items-center gap-3 py-2 border-b border-border"><span class="text-sm text-slate-400 w-40">数据库</span><span class="font-mono text-sm">${esc(info.database_url)}</span></div>
    <div class="flex items-center gap-3 py-2 border-b border-border"><span class="text-sm text-slate-400 w-40">JWT 算法</span><span class="font-mono text-sm">${esc(info.jwt_algorithm)}</span></div>
    <div class="flex items-center gap-3 py-2 border-b border-border"><span class="text-sm text-slate-400 w-40">管理员账户</span><span class="font-mono text-sm">${esc(info.admin_username)}</span></div>
    <div class="py-2"><span class="text-sm text-slate-400">已配置设备</span><div class="mt-2 flex flex-wrap gap-2">${info.configured_devices.map(d=>`<span class="badge badge-blue">${esc(d)}</span>`).join('')}</div></div>
  </div>`;
}catch(e){console.error('system',e);}}

// ── utils ────────────────────────────────────────────────────────────────────
function esc(s){const d=document.createElement('div');d.textContent=String(s??'');return d.innerHTML;}

// ── auto refresh ─────────────────────────────────────────────────────────────
setInterval(()=>{if(!_token)return;const a=document.querySelector('.tab-btn.active');if(a)refreshTab(a.dataset.tab);},10000);
</script>
</body>
</html>
